name: WordPress K8s CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Manifests
        # Validates all your manifests including the new ones
        run: kubeconform -summary -strict k8s/*.yaml k8s/backup/*.yaml

  deploy:
    needs: lint-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 

      - name: Get Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Open K3s API Port (6443)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy to K3s
        env:
          KUBECONFIG_RAW: ${{ secrets.KUBECONFIG }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          AWS_ACCESS_KEY_ID_APP: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_APP: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          # 1. Setup Kubeconfig
          mkdir -p ~/.kube
          echo "$KUBECONFIG_RAW" | base64 -d > ~/.kube/config
          
          # 2. Apply Namespaces
          kubectl apply -f k8s/namespace.yaml
          
          # 3. Inject Secrets into Template and Apply
          envsubst < k8s/secrets.yaml | kubectl apply -f -
          
          # 4. Apply Config and Storage
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/mysql-pvc.yaml
          
          # 5. Apply Internal Networking (The Nginx ClusterIP Service)
          kubectl apply -f k8s/nginx-service.yaml
          
          # 6. Deploy Infrastructure (Cloudflare Tunnel)
          kubectl apply -f k8s/cloudflared.yaml
          
          # 7. Deploy Database
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          
          # 8. Wait for MySQL to be ready
          kubectl rollout status deployment/mysql-deployment -n wordpress-app --timeout=120s
          
          # 9. Deploy Application
          kubectl apply -f k8s/wordpress-deployment.yaml
          kubectl apply -f k8s/wordpress-service.yaml
          
          # 10. Apply Ingress Rules
          kubectl apply -f k8s/ingress.yaml
          
          # 11. Apply Backup CronJobs
          kubectl apply -f k8s/backup/backup-cronjob.yml
          
          echo "Deployment Verification:"
          kubectl get pods,svc,ingress -A

      - name: Close K3s API Port
        if: always() 
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32