name: WordPress K8s CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate Manifests
        run: kubeconform -summary -strict k8s/*.yaml k8s/backup/*.yaml

  deploy:
    needs: lint-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 

      - name: Get Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Open K3s API Port (6443)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy to K3s
        env:
          # Use your screenshot's exact secret name
          KUBECONFIG_RAW: ${{ secrets.KUBECONFIG }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          AWS_ACCESS_KEY_ID_APP: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_APP: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          run: |
          # 1. Setup Kubeconfig (The Bulletproof Way)
          mkdir -p ~/.kube
          cat <<EOF > ~/.kube/config
          ${{ secrets.KUBECONFIG }}
          EOF
          chmod 600 ~/.kube/config
          
          # 2. Test Connection (Debugging)
          echo "Testing connection to K3s API..."
          kubectl cluster-info || { echo "Failed to connect to K3s API"; exit 1; }

          # 3. Apply Resources
          kubectl apply -f k8s/namespace.yaml
          envsubst < k8s/secrets.yaml | kubectl apply -f -
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/mysql-pvc.yaml
          kubectl apply -f k8s/nginx-service.yaml
          kubectl apply -f k8s/cloudflared.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          
          kubectl rollout status deployment/mysql-deployment -n wordpress-app --timeout=120s
          
          kubectl apply -f k8s/wordpress-deployment.yaml
          kubectl apply -f k8s/wordpress-service.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # Check if backup folder exists before applying
          if [ -d "k8s/backup" ]; then
            kubectl apply -f k8s/backup/
          fi

      - name: Close K3s API Port
        if: always() 
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 6443 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32