apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef: # Indented under valueFrom
                  name: tunnel-token
                  key: token
          resources:
            limits:
              cpu: "500m"     # Max 0.5 CPU core
              memory: "256Mi" # Max 256MB RAM
            requests:
              cpu: "100m"     # Guaranteed 0.1 CPU core
              memory: "128Mi" # Guaranteed 128MB RAM
         
